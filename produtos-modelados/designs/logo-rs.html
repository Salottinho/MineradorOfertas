<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Logo RS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 24px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 320px;
    color: #a3e635;
    letter-spacing: -8px;
    line-height: 1;
  }
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 48px;
    color: #e8e8e8;
    margin-top: 24px;
    letter-spacing: 8px;
    text-transform: lowercase;
  }
</style>
</head>
<body>
  <div class="logo-text">RS</div>
  <div class="subtitle">renda silenciosa</div>
</body>
</html>
