<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Depoimento</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Inter:wght@400;400italic&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 100px;
  }
  .aspas {
    font-family: 'Syne', sans-serif;
    font-size: 200px;
    color: #a3e635;
    line-height: 0.6;
    margin-bottom: 0;
  }
  .texto {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-style: italic;
    font-size: 40px;
    color: #ffffff;
    text-align: center;
    line-height: 1.5;
    max-width: 800px;
  }
  .nome {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 28px;
    color: #666666;
    text-align: center;
  }
  .estrelas {
    display: flex;
    gap: 12px;
  }
  .estrela {
    width: 40px;
    height: 40px;
    color: #f59e0b;
  }
  .rodape {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 22px;
    color: #444444;
    position: absolute;
    bottom: 60px;
  }
</style>
</head>
<body>
  <div class="aspas">&ldquo;</div>
  <div class="texto">Comecei devendo R$2.180. Em 60 dias ja tinha quitado tudo e ainda sobrou.</div>
  <div class="nome">Carlos, 52 anos &mdash; Belo Horizonte</div>
  <div class="estrelas">
    <svg class="estrela" viewBox="0 0 24 24" fill="#f59e0b"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    <svg class="estrela" viewBox="0 0 24 24" fill="#f59e0b"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    <svg class="estrela" viewBox="0 0 24 24" fill="#f59e0b"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    <svg class="estrela" viewBox="0 0 24 24" fill="#f59e0b"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    <svg class="estrela" viewBox="0 0 24 24" fill="#f59e0b"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
  </div>
  <div class="rodape">Resultados com dedicacao</div>
</body>
</html>
