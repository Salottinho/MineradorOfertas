<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Print Resultado</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Inter:wght@400;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 80px;
  }
  .dashboard {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 24px;
    padding: 56px 72px;
    width: 840px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .dash-titulo {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 24px;
    color: #666666;
    text-transform: uppercase;
    letter-spacing: 4px;
  }
  .dash-valor {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 96px;
    color: #a3e635;
    line-height: 1;
  }
  .dash-info {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 28px;
    color: #888888;
  }
  .grafico {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    height: 120px;
    margin-top: 16px;
  }
  .barra {
    width: 48px;
    background: #a3e635;
    border-radius: 6px 6px 0 0;
    opacity: 0.7;
  }
  .barra:nth-child(1) { height: 24px; }
  .barra:nth-child(2) { height: 36px; }
  .barra:nth-child(3) { height: 32px; }
  .barra:nth-child(4) { height: 52px; }
  .barra:nth-child(5) { height: 48px; }
  .barra:nth-child(6) { height: 68px; }
  .barra:nth-child(7) { height: 64px; }
  .barra:nth-child(8) { height: 80px; }
  .barra:nth-child(9) { height: 96px; }
  .barra:nth-child(10) { height: 120px; opacity: 1; }
  .nome {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 32px;
    color: #ffffff;
  }
  .frase {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 28px;
    color: #a3e635;
  }
</style>
</head>
<body>
  <div class="dashboard">
    <div class="dash-titulo">Painel de Vendas</div>
    <div class="dash-valor">R$3.847,00</div>
    <div class="dash-info">em 41 dias | 23 vendas</div>
    <div class="grafico">
      <div class="barra"></div>
      <div class="barra"></div>
      <div class="barra"></div>
      <div class="barra"></div>
      <div class="barra"></div>
      <div class="barra"></div>
      <div class="barra"></div>
      <div class="barra"></div>
      <div class="barra"></div>
      <div class="barra"></div>
    </div>
  </div>
  <div class="nome">Marcia, 34 &mdash; Goiania</div>
  <div class="frase">Sem aparecer. Sem criar conteudo.</div>
</body>
</html>
<!-- Abra no Chrome, Ctrl+Shift+I, toggle device toolbar, defina resolucao 1080x1080, screenshot -->
