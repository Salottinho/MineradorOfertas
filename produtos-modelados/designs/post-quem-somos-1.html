<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Quem Somos - Card 1</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 56px;
    color: #a3e635;
    position: absolute;
    top: 80px;
  }
  .valor {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 128px;
    color: #a3e635;
    line-height: 1;
  }
  .subtitulo {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 48px;
    color: #ffffff;
    margin-top: 32px;
    text-align: center;
    line-height: 1.3;
  }
  .rodape {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 28px;
    color: #666666;
    position: absolute;
    bottom: 80px;
  }
</style>
</head>
<body>
  <div class="logo">RS</div>
  <div class="valor">R$3.847/Mes</div>
  <div class="subtitulo">Sem Aparecer Na Internet</div>
  <div class="rodape">Deslize pra saber como &rarr;</div>
</body>
</html>
