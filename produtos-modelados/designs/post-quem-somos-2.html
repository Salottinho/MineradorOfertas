<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Quem Somos - Card 2</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0f0f0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .titulo {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 64px;
    color: #ffffff;
    margin-bottom: 72px;
  }
  .bullets {
    display: flex;
    flex-direction: column;
    gap: 40px;
    padding: 0 100px;
    width: 100%;
  }
  .bullet {
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .check {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #a3e635;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .check svg {
    width: 28px;
    height: 28px;
  }
  .bullet-text {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 36px;
    color: #e8e8e8;
    line-height: 1.4;
  }
  .rodape {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 48px;
    color: #666666;
    position: absolute;
    bottom: 80px;
  }
</style>
</head>
<body>
  <div class="titulo">O Que E O Metodo</div>
  <div class="bullets">
    <div class="bullet">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="bullet-text">Venda produtos fisicos como afiliado</span>
    </div>
    <div class="bullet">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="bullet-text">Sem aparecer, sem criar conteudo</span>
    </div>
    <div class="bullet">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0f0f0f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="bullet-text">Comece com menos de R$50</span>
    </div>
  </div>
  <div class="rodape">&rarr;</div>
</body>
</html>
